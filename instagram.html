<html>
<head>
    <title>Instagram</title>
</head>
<body>
    <script>
        async function getUsername() {
          // IMPORTANT: Use a REAL username here for testing (not numeric ID)
          // const username = "instagram";   // test with this first
          const username = "47223550293";    // won't work — change to actual username if you have it
        
          const targetUrl = `https://i.instagram.com/api/v1/users/web_profile_info/?username=${username}`;
        
          // Try a different proxy — corsproxy.io is often insta-blocked now
          // Alternatives: https://api.allorigins.win/raw?url=   or   https://corsproxy.io/?
          const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
          // const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
        
          try {
            const response = await fetch(proxyUrl, {
              method: 'GET',
              headers: {
                'X-IG-App-ID': '936619743392459',
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36',  // update to recent Chrome version
                'Accept': '*/*',
                'Accept-Language': 'en-US,en;q=0.9',
                'X-IG-WWW-Claim': '0',               // sometimes helps avoid 401
                'X-ASBD-ID': '129477',               // common value seen in working requests
              },
              credentials: 'omit'  // avoid sending any unwanted cookies
            });
        
            if (!response.ok) {
              const errorText = await response.text();  // ← this is key for debugging
              console.error(`HTTP ${response.status} — Details:`, errorText);
              throw new Error(`HTTP ${response.status} — probably blocked / bad proxy / missing auth`);
            }
        
            const data = await response.json();
            console.log("Full response:", data);  // inspect in console
        
            const user = data?.data?.user;
            if (user?.username) {
              window.location.replace(`https://www.instagram.com/${user.username}/`);
            } else {
              console.error("No user data found", data);
            }
          } catch (error) {
            console.error("Fetch failed:", error);
          }
        }
        
        getUsername();    
    </script>
    <p>Instagram: <a href="https://www.instagram.com">ayhamj.png</a></p>
</body>
</html>
