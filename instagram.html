<html>
<head>
    <title>Instagram</title>
</head>
<body>
    <script>
        // --- CONFIGURATION ---
        const USER_ID = "47223550293";
        const SESSION_ID = "0"; // IMPORTANT: Replace "0" with your actual sessionid cookie string
        // --- END CONFIGURATION ---

        async function getUsername() {
            
            // FIXED: Added '$' before {USER_ID} and used the correct API path
            const targetUrl = `https://i.instagram.com{USER_ID}/info/`;
            
            // FIXED: Added '/?' and used '${}' correctly for the proxy URL
            const proxyUrl = `https://corsproxy.io{encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'X-IG-App-ID': '936619743392459',
                        'Cookie': `sessionid=${SESSION_ID}`
                    }
                });

                if (!response.ok) throw new Error('Proxy or Auth Failed');

                const data = await response.json();
                
                if (data.user && data.user.username) {
                    const username = data.user.username;
                    // FIXED: Added '$' before {username}
                    const profileLink = `https://www.instagram.com{username}/`;
                    window.location.replace(profileLink);
                } else {
                    throw new Error('User not found');
                }
            } catch (error) {
                console.error("Error details:", error);
            }
        } // FIXED: Added missing closing brace

        // Run on page load
        getUsername();
    </script>
    <p>Instagram: <a href="https://www.instagram.com">ayhamj.png</a></p>
</body>
</html>
