<html>
<head>
    <title>Instagram</title>
</head>
<body>
    <script>
        const usernameOrId = "47223550293"; // or real username
        const apiUrl = `https://www.instagram.com/api/v1/users/web_profile_info/?username=${usernameOrId}`;
        
        fetch(`https://cors-anywhere.herokuapp.com/${apiUrl}`, {   // or better proxy
          headers: {
            'User-Agent': 'Mozilla/5.0 ... Instagram ...',
            'X-IG-App-ID': '936619743392459'
          }
        })
        .then(r => r.json())
        .then(data => {
          const user = data.data?.user;
          if (user?.username) {
            window.location = `https://www.instagram.com/${user.username}/`;
          }
        });
    </script>
    <p>Instagram: <a href="https://www.instagram.com">ayhamj.png</a></p>
</body>
</html>
