<html>
<head>
    <title>Instagram</title>
</head>
<body>
    <script>
        // --- CONFIGURATION ---
        const USER_ID = "47223550293";
        const SESSION_ID = "0"; 
        // --- END CONFIGURATION ---

        async function getUsername() {
            const resultDiv = document.getElementById('result');
            const targetUrl = `https://i.instagram.com{USER_ID}/info/`;
            
            // Using AllOrigins as a more reliable alternative proxy
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy connection failed');

                const data = await response.json();
                
                // AllOrigins wraps the result in a 'contents' string, so we must parse it
                const igData = JSON.parse(data.contents);
                
                if (igData.user && igData.user.username) {
                    const username = igData.user.username;
                    const profileLink = `https://www.instagram.com{username}/`;
                    resultDiv.innerText = `Redirecting to @${username}...`;
                    window.location.replace(profileLink);
                } else {
                    throw new Error('User not found or Session ID expired');
                }
            } catch (error) {
                console.error("Error details:", error);
            }
            
        // Run on page load
        getUsername();
    </script>
  <p>Instagram: <a href="https://www.instagram.com/ayhamj.png/">ayhamj.png</a></p>
</body>
</html>
