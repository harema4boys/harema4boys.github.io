<html>
<head>
    <title>Instagram</title>
</head>
<body>
    <script>
        // --- CONFIGURATION ---
        const USER_ID = "47223550293";
        const SESSION_ID = "YOUR_ACTUAL_SESSION_ID_HERE"; // Replace "0" with your real ID
        // --- END CONFIGURATION ---

        async function getUsername() {
            
            // The exact API endpoint Instagram needs
            const targetUrl = `https://i.instagram.com{USER_ID}/info/`;
            
            // Switching to corsproxy.io which often handles GitHub Pages origins better
            const proxyUrl = `https://corsproxy.io{encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'X-IG-App-ID': '936619743392459',
                        'Cookie': `sessionid=${SESSION_ID}`
                    }
                });

                if (!response.ok) throw new Error('Proxy or Auth Failed');

                const igData = await response.json();
                
                if (igData.user && igData.user.username) {
                    const username = igData.user.username;
                    const profileLink = `https://www.instagram.com{username}/`;
                    window.location.replace(profileLink);
                } else {
                    throw new Error('User data not found');
                }
            } catch (error) {
                console.error("Error details:", error);
            }
        }

        getUsername();
    </script>
    <p>Instagram: <a href="https://www.instagram.com">ayhamj.png</a></p>
</body>
</html>
